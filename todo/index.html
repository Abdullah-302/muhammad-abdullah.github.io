<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My To-Do List</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <div class="todo-app">
            <h1>My To-Do List</h1>
            
            <div class="input-container">
                <input 
                    type="text" 
                    id="todoInput" 
                    placeholder="Add a new task..."
                    autocomplete="off"
                >
                <button id="addBtn" class="add-btn">Add</button>
            </div>
            
            <div class="filter-buttons">
                <button id="allBtn" class="filter-btn active">All</button>
                <button id="activeBtn" class="filter-btn">Active</button>
                <button id="completedBtn" class="filter-btn">Completed</button>
            </div>
            
            <ul id="todoList" class="todo-list"></ul>
            
            <div class="stats">
                <span id="statsText">0 tasks remaining</span>
                <button id="clearBtn" class="clear-btn">Clear Completed</button>
            </div>
        </div>
    </div>
    
    <script src="script.js"></script>
</body>
</html>
